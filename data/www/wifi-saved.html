<!doctype html>
<html lang="th">
   <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Saved</title>
      <style>
         body {
            margin: 0;
            min-height: 100vh;
            font-family:
               ui-sans-serif,
               system-ui,
               -apple-system,
               "Segoe UI",
               Roboto,
               "Noto Sans Thai",
               Arial;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b1020;
            color: #e8eeff;
            padding: 18px;
         }

         .card {
            width: 100%;
            max-width: 420px;
            background: #111a33;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
            text-align: center;
         }

         .ok {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: rgba(34, 197, 94, 0.18);
            border: 1px solid rgba(34, 197, 94, 0.35);
            margin-bottom: 10px;
            font-size: 26px;
         }

         h3 {
            margin: 8px 0 6px;
         }

         p {
            margin: 0;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.5;
         }

         .small {
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.5;
         }

         /* ✅ ปุ่มกลับ Dashboard (โทนเดิม) */
         .btnRow {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
         }

         .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            cursor: pointer;

            padding: 12px 14px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 13px;

            background: rgba(255, 255, 255, 0.06);
            color: #e8eeff;
            border: 1px solid rgba(255, 255, 255, 0.14);
         }

         .btn:active {
            transform: translateY(1px);
         }

         .btn.primary {
            border-color: rgba(34, 197, 94, 0.35);
            background: rgba(34, 197, 94, 0.14);
         }

         /* ✅ Responsive */
         @media (max-width: 420px) {
            body {
               padding: 12px;
            }
            .card {
               padding: 16px;
               border-radius: 16px;
            }
            .btnRow {
               gap: 8px;
            }
            .btn {
               width: 100%;
            }
         }
      </style>
   </head>

   <body>
      <div class="card">
         <div class="ok">✅</div>
         <h3>บันทึกแล้ว</h3>
         <p>กำลังรีบูตเพื่อเชื่อมต่อ Wi-Fi…</p>

         <div class="btnRow">
            <a class="btn primary" href="/">กลับหน้า Dashboard</a>
         </div>

         <div class="small">
            ถ้าหน้านี้หายไปก่อน ให้รอเครื่องบูต แล้วกลับเข้า
            <b>http://192.168.4.1</b>
         </div>
      </div>

      <script>
         // เผื่อกรณีคุณเปลี่ยนพฤติกรรม "ไม่รีบูตทันที" ในอนาคต:
         // กลับ dashboard อัตโนมัติหลัง 2 วิ (ไม่บังคับ)
         setTimeout(() => {
            try {
               // ใช้ path root ของ server เดียว
               // ถ้ารีบูตก่อน timeout ก็ไม่เป็นไร
               window.location.href = "/";
            } catch (e) {}
         }, 2000);
      </script>
   </body>
</html>
