[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; 1. Serial Monitor Configuration
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, default

; ใช้ LittleFS เป็น filesystem
board_build.filesystem = littlefs

; 2. Library Dependencies
lib_deps =
    claws/BH1750 @ ^1.3.0    ; Driver สำหรับเซนเซอร์แสง BH1750
    adafruit/RTClib @ ^2.1.1 ; ไลบรารีสำหรับ RTC (Real Time Clock) เช่น DS3231
    bblanchon/ArduinoJson @ ^7.0.0 ; ไลบรารีสำหรับจัดการ JSON (ใช้สำหรับส่งข้อมูลไปยังเซิร์ฟเวอร์)

; 3. Build Flags
build_flags = 
    -D CORE_DEBUG_LEVEL=3        ; เปิด debug log ของ ESP32 (ปรับลดได้ทีหลัง)
    -D VERSION=\"1.0.0-SMARTFARM\"  ; ตั้งชื่อเวอร์ชัน firmware ของคุณ

; 4. Upload Settings
upload_speed = 921600           ; ถ้าแฟลชมีปัญหา ค่อยลด speed ลงทีหลัง