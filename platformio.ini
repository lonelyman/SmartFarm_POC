[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Serial Monitor & Upload Settings
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, colorize
; สำหรับการพัฒนาและดีบักทั่วไปที่หน้าจอ
; -----------------------------------------------------------------
; หรือใช้แบบด้านล่างนี้ หากต้องการเก็บบันทึก Log ลงไฟล์ด้วย (Burn-in Test)
; monitor_filters = esp32_exception_decoder, time, colorize, log2file
; -----------------------------------------------------------------
; หรือใช้แบบด้านล่างนี้ หากต้องการเก็บบันทึก Log ลงไฟล์ด้วย (Burn-in Test)
; monitor_filters = esp32_exception_decoder, time, colorize, log2file
; Filesystem & Partitions
board_build.filesystem = littlefs
board_build.partitions = default_16MB.csv

; Memory & Flash Settings (Optimized for N16R8)
board_build.arduino.memory_type = qio_opi ; จัดการ QIO Flash และ OPI PSRAM แบบเบ็ดเสร็จ
board_upload.flash_size = 16MB

; Libraries
lib_deps =
    claws/BH1750 @ ^1.3.0
    adafruit/RTClib @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
    adafruit/Adafruit SHT4x Library @ ^1.0.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0

; Build flags (Enabled PSRAM Octal, No USB CDC mapped to Serial)
build_flags = 
    -D CORE_DEBUG_LEVEL=3
    -D VERSION=\"1.0.0-SMARTFARM\"
    -D BOARD_HAS_PSRAM