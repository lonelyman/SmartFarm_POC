[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; 1. Serial Monitor Configuration
build_type = debug   
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, default

; ESP32-S3: USB CDC (Native USB) - ต้องตั้งค่านี้เพื่อให้ Serial ทำงานผ่าน USB-C
monitor_port = /dev/tty.usbmodem*  ; macOS example — ปรับตาม OS จริง

; ใช้ LittleFS เป็น filesystem
board_build.filesystem = littlefs

; ESP32-S3 N16R8: Flash 16MB QIO + PSRAM Octal 8MB
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; 2. Library Dependencies
lib_deps =
    claws/BH1750 @ ^1.3.0
    adafruit/RTClib @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
    adafruit/Adafruit SHT4x Library @ ^1.0.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0

; 3. Build Flags
build_flags = 
    -D CORE_DEBUG_LEVEL=3        
    -D VERSION=\"1.0.0-SMARTFARM\"
    ; ESP32-S3: ใช้ USB CDC เป็น Serial (แทน UART0)
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; ESP32-S3 N16R8: เปิดใช้ PSRAM Octal
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; 4. Upload Settings
upload_speed = 921600
; ESP32-S3: ใช้ USB CDC สำหรับ upload ด้วย (ถ้าใช้ native USB)
; upload_protocol = esp-builtin   ; uncomment ถ้าใช้ native USB upload
